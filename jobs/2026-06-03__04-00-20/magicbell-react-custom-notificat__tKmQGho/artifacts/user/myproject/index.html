<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MagicBell Notifications</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .custom-notification-item {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }
    .custom-notification-title {
      font-weight: bold;
      margin-bottom: 4px;
    }
    .custom-notification-content {
      color: #666;
      font-size: 14px;
    }
    .custom-mark-read-btn {
      margin-top: 8px;
      padding: 4px 12px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .custom-mark-read-btn:hover {
      background: #357abd;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/index.jsx"></script>
</body>
</html>
