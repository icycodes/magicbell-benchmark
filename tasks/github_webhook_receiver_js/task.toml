version = "1.0"

[metadata]

[environment]
build_timeout_sec = 600.0
cpus = 4
memory_mb = 8192
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
POCHI_API_KEY = "${POCHI_API_KEY}"
GITHUB_WEBHOOK_SECRET = "${GITHUB_WEBHOOK_SECRET}"
MAGICBELL_PROJECT_TOKEN = "${MAGICBELL_PROJECT_TOKEN}"
MAGICBELL_EMAIL = "${MAGICBELL_EMAIL}"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 600.0

[verifier.env]
GITHUB_WEBHOOK_SECRET = "${GITHUB_WEBHOOK_SECRET}"
MAGICBELL_PROJECT_TOKEN = "${MAGICBELL_PROJECT_TOKEN}"
MAGICBELL_EMAIL = "${MAGICBELL_EMAIL}"

[solution.env]

